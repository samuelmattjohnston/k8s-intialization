---
- hosts: masters[0]
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    # --------------------------------------------------
    # 1. PRE-REQUISITES
    # --------------------------------------------------
    - name: Enable strictARP in kube-proxy (Required for MetalLB)
      # Even with Cilium replacement, MetalLB checks this setting.
      # Since kube-proxy is missing, we create a dummy config or skip.
      # Actually, Cilium handles strictARP logic internally, but MetalLB's 
      # memberlist check might complain if it can't find the config.
      # We will proceed assuming Cilium's KubeProxyReplacement covers this.
      debug:
        msg: "Skipping kube-proxy patch as it is not installed."

    # --------------------------------------------------
    # 2. INSTALL CILIUM (CLI Method)
    # --------------------------------------------------
    - name: Download Cilium CLI
      shell: |
        CILIUM_CLI_VERSION=$(curl -s https://api.github.com/repos/cilium/cilium-cli/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
        curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64
        chmod +x cilium-linux-amd64
        mv cilium-linux-amd64 /usr/local/bin/cilium
      args:
        creates: /usr/local/bin/cilium

    - name: Get Dynamic Private Interface List
      # Generates a Regex string (e.g., "enX2|vlan.30") from inventory
      set_fact:
        cilium_devices: "{% set iface_list = [] %}{% for host in groups['masters'] %}{% set iface = hostvars[host]['iface_private'] %}{% if iface not in iface_list %}{% set _ = iface_list.append(iface) %}{% endif %}{% endfor %}{{ iface_list | join('|') }}"

    - name: Install Cilium
      # Note: We quote '{{ cilium_devices }}' to prevent the pipe | from breaking the shell command
      shell: |
        cilium install \
        --version 1.16.1 \
        --set kubeProxyReplacement=true \
        --set k8sServiceHost={{ cluster_vip }} \
        --set k8sServicePort=6443 \
        --set ipam.mode=kubernetes \
        --set devices='{{ cilium_devices }}' \
        --set l2announcements.enabled=true \
        --set hubble.enabled=true \
        --set hubble.relay.enabled=true \
        --set hubble.ui.enabled=true
      register: cilium_install
      changed_when: "'Installation complete' in cilium_install.stdout"

    - name: Wait for Cilium Status
      shell: cilium status --wait
      
    - name: Untaint Masters (Allow workloads on control plane)
      shell: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: yes

    # --------------------------------------------------
    # 3. INSTALL GATEWAY API
    # --------------------------------------------------
    - name: Install Gateway API CRDs
      shell: |
        kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

    # --------------------------------------------------
    # 4. INSTALL ISTIO
    # --------------------------------------------------
    - name: Download Istioctl
      shell: |
        curl -L https://istio.io/downloadIstio | sh -
        mv istio-*/bin/istioctl /usr/local/bin/
        rm -rf istio-*
      args:
        creates: /usr/local/bin/istioctl

    - name: Generate Istio Config
      template:
        src: templates/istio-install-config.yaml.j2
        dest: /tmp/istio-config.yaml

    - name: Apply Istio
      shell: |
        istioctl install -y -f /tmp/istio-config.yaml

    # --------------------------------------------------
    # 5. INSTALL METALLB
    # --------------------------------------------------
    - name: Create MetalLB Namespace
      shell: kubectl create namespace metallb-system --dry-run=client -o yaml | kubectl apply -f -

    - name: Label MetalLB Namespace
      shell: |
        kubectl label namespace metallb-system \
        pod-security.kubernetes.io/enforce=privileged \
        pod-security.kubernetes.io/audit=privileged \
        pod-security.kubernetes.io/warn=privileged \
        --overwrite

    - name: Install MetalLB
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system --for=condition=ready pod --selector=app=metallb --timeout=90s

    - name: Apply MetalLB Pool
      template:
        src: templates/metallb-config.yaml.j2
        dest: /tmp/metallb-config.yaml

    - name: Activate Pool
      shell: kubectl apply -f /tmp/metallb-config.yaml

    # --------------------------------------------------
    # 6. DEPLOY GATEWAY
    # --------------------------------------------------
    - name: Deploy Gateway
      template:
        src: templates/gateway.yaml.j2
        dest: /tmp/gateway.yaml
      
    - name: Apply Gateway
      shell: kubectl apply -f /tmp/gateway.yaml
