---
- hosts: k8s-node-01
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    # --------------------------------------------------
    # 1. PRE-REQUISITES (Strict ARP & Security)
    # --------------------------------------------------
    - name: Enable strictARP in kube-proxy (Required for MetalLB Layer 2)
      shell: |
        kubectl get configmap kube-proxy -n kube-system -o yaml | \
        sed -e "s/strictARP: false/strictARP: true/" | \
        kubectl apply -f - -n kube-system
      register: arp_patch
      changed_when: "'configured' in arp_patch.stdout"

    - name: Restart kube-proxy to apply StrictARP
      shell: kubectl delete pod -n kube-system -l k8s-app=kube-proxy
      when: arp_patch.changed

    # --------------------------------------------------
    # 2. INSTALL CALICO (CNI)
    # --------------------------------------------------
    - name: Install Calico Operator (Server-Side Apply)
      shell: |
        kubectl apply --server-side --force-conflicts -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml

    - name: Download Calico Custom Resources
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/custom-resources.yaml
        dest: /tmp/calico-custom-resources.yaml

    - name: Patch Calico CIDR to match Kubeadm (10.244.0.0/16)
      replace:
        path: /tmp/calico-custom-resources.yaml
        regexp: '192.168.0.0/16'
        replace: '10.244.0.0/16'

    - name: Apply Patched Calico Resources
      shell: kubectl apply -f /tmp/calico-custom-resources.yaml

    - name: Wait for Calico DaemonSet
      shell: kubectl get ds -n calico-system calico-node
      register: ds_check
      retries: 20
      delay: 10
      until: ds_check.rc == 0

    # CRITICAL: Bind Calico to Private Interface (enX2)
    - name: Patch Calico Autodetection
      shell: |
        kubectl set env daemonset/calico-node -n calico-system IP_AUTODETECTION_METHOD=interface={{ iface_private }}
      retries: 5
      delay: 5
      register: result
      until: result.rc == 0

    - name: Untaint Masters
      shell: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: yes

    # --------------------------------------------------
    # 3. INSTALL METALLB (Load Balancer)
    # --------------------------------------------------
    - name: Create MetalLB Namespace
      shell: kubectl create namespace metallb-system --dry-run=client -o yaml | kubectl apply -f -

    # CRITICAL: Allow MetalLB Speaker to access raw network sockets (Fixes "Silent Speaker")
    - name: Label MetalLB Namespace for Pod Security
      shell: |
        kubectl label namespace metallb-system \
        pod-security.kubernetes.io/enforce=privileged \
        pod-security.kubernetes.io/audit=privileged \
        pod-security.kubernetes.io/warn=privileged \
        --overwrite

    - name: Install MetalLB Manifest
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system --for=condition=ready pod --selector=app=metallb --timeout=90s

    - name: Apply MetalLB Configuration (Pools & Advertisements)
      template:
        src: templates/metallb-config.yaml.j2
        dest: /tmp/metallb-config.yaml

    - name: Activate MetalLB Pool
      shell: kubectl apply -f /tmp/metallb-config.yaml

    - name: Patch MetalLB Speaker to Ignore Exclusion Label
      ansible.builtin.shell: |
        kubectl patch daemonset speaker -n metallb-system --type=json -p='[
          {"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--ignore-exclude-lb"}
        ]'
      register: ignore_patch
      changed_when: "'patched' in ignore_patch.stdout"
    # --------------------------------------------------
    # 4. INSTALL INGRESS
    # --------------------------------------------------
    - name: Install Nginx Ingress Controller
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/cloud/deploy.yaml

    # Optional: Force Cluster Policy for Immediate Stability (Remove if you strictly require Local)
    # - name: Patch Ingress Service to Cluster Policy
    #   shell: kubectl patch svc -n ingress-nginx ingress-nginx-controller -p '{"spec":{"externalTrafficPolicy":"Cluster"}}'
