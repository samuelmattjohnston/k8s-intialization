---
- hosts: masters[0]
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    # --------------------------------------------------
    # 1. PRE-REQUISITES
    # --------------------------------------------------
    - name: Enable strictARP in kube-proxy
      shell: |
        kubectl get configmap kube-proxy -n kube-system -o yaml | \
        sed -e "s/strictARP: false/strictARP: true/" | \
        kubectl apply -f - -n kube-system
      register: arp_patch
      changed_when: "'configured' in arp_patch.stdout"

    - name: Restart kube-proxy
      shell: kubectl delete pod -n kube-system -l k8s-app=kube-proxy
      when: arp_patch.changed

    # --------------------------------------------------
    # 2. INSTALL CALICO
    # --------------------------------------------------
    - name: Install Calico Operator
      shell: |
        kubectl apply --server-side --force-conflicts -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/tigera-operator.yaml

    - name: Download Calico Custom Resources
      get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/custom-resources.yaml
        dest: /tmp/calico-custom-resources.yaml

    - name: Patch Calico CIDR
      replace:
        path: /tmp/calico-custom-resources.yaml
        regexp: '192.168.0.0/16'
        replace: '10.244.0.0/16'

    - name: Apply Calico Resources
      shell: kubectl apply -f /tmp/calico-custom-resources.yaml

    - name: Wait for Calico
      shell: kubectl get ds -n calico-system calico-node
      register: ds_check
      retries: 20
      delay: 10
      until: ds_check.rc == 0

    # DYNAMIC: Patches autodetection for ALL nodes based on interface name
    - name: Patch Calico Autodetection
      shell: |
        kubectl set env daemonset/calico-node -n calico-system IP_AUTODETECTION_METHOD="interface=enX2|vlan.30"
      retries: 5
      delay: 5
      until: result.rc == 0
      register: result
      
    - name: Untaint Masters (Allow workloads on control plane)
      shell: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: yes

    # --------------------------------------------------
    # 3. INSTALL GATEWAY API
    # --------------------------------------------------
    - name: Install Gateway API CRDs
      shell: |
        kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml

    # --------------------------------------------------
    # 4. INSTALL ISTIO
    # --------------------------------------------------
    - name: Download Istioctl
      shell: |
        curl -L https://istio.io/downloadIstio | sh -
        mv istio-*/bin/istioctl /usr/local/bin/
        rm -rf istio-*
      args:
        creates: /usr/local/bin/istioctl

    - name: Generate Istio Config
      template:
        src: templates/istio-install-config.yaml.j2
        dest: /tmp/istio-config.yaml

    - name: Apply Istio
      shell: |
        istioctl install -y -f /tmp/istio-config.yaml

    # --------------------------------------------------
    # 5. INSTALL METALLB
    # --------------------------------------------------
    - name: Create MetalLB Namespace
      shell: kubectl create namespace metallb-system --dry-run=client -o yaml | kubectl apply -f -

    - name: Label MetalLB Namespace
      shell: |
        kubectl label namespace metallb-system \
        pod-security.kubernetes.io/enforce=privileged \
        pod-security.kubernetes.io/audit=privileged \
        pod-security.kubernetes.io/warn=privileged \
        --overwrite

    - name: Install MetalLB
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.9/config/manifests/metallb-native.yaml
        kubectl wait --namespace metallb-system --for=condition=ready pod --selector=app=metallb --timeout=90s

    - name: Apply MetalLB Pool
      template:
        src: templates/metallb-config.yaml.j2
        dest: /tmp/metallb-config.yaml

    - name: Activate Pool
      shell: kubectl apply -f /tmp/metallb-config.yaml

    # --------------------------------------------------
    # 6. DEPLOY GATEWAY
    # --------------------------------------------------
    - name: Deploy Gateway
      template:
        src: templates/gateway.yaml.j2
        dest: /tmp/gateway.yaml
      
    - name: Apply Gateway
      shell: kubectl apply -f /tmp/gateway.yaml
