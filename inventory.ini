[masters]
# --- XCP-ng VMs (Standard) ---
# These use the defaults from [all:vars] (enX0, enX1, etc.)
k8s-node-01 ansible_host=192.168.130.11 admin_ip=192.168.255.131 public_ip=192.168.130.11 private_ip=192.168.110.11 internal_ip=192.168.100.11
k8s-node-02 ansible_host=192.168.130.12 admin_ip=192.168.255.128 public_ip=192.168.130.12 private_ip=192.168.110.12 internal_ip=192.168.100.12
k8s-node-03 ansible_host=192.168.130.13 admin_ip=192.168.255.104 public_ip=192.168.130.13 private_ip=192.168.110.13 internal_ip=192.168.100.13

# --- New Bare Metal Node (Trunk) ---
# 1. We define the PARENT interface (the physical wire).
# 2. We OVERRIDE the interface names to match the VLANs we want.
k8s-node-bm-01 ansible_host=192.168.130.99 admin_ip=192.168.255.199 public_ip=192.168.130.99 private_ip=192.168.110.99 internal_ip=192.168.100.99 \
vlan_parent=eno1 \
iface_admin=eno1 \
iface_public=vlan.20 \
vlan_id_public=20 \
iface_private=vlan.30 \
vlan_id_private=30 \
iface_internal=vlan.40 \
vlan_id_internal=40

[all:vars]
ansible_user=debian
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
# Defaults for XCP-ng (Physical Interfaces)
iface_admin=enX0
iface_public=enX1
iface_private=enX2
iface_internal=enX3
# Cluster Config
k8s_version=1.31.0-1.1
cluster_vip=192.168.255.50
# Gateways
gateway_public=192.168.130.254
