---
- hosts: masters
  become: yes
  tasks:
    - name: Install systemd-resolved
      apt:
        name: systemd-resolved
        state: present

    # ==============================================================================
    # PHASE 1: PREP (BARE METAL ONLY)
    # ==============================================================================
    # If we are on the bare metal node, we must create the VLAN "hardware" first.
    # On VMs, this is skipped because 'vlan_parent' is not defined.

    - name: "Prep: Define VLAN Devices"
      copy:
        dest: "/etc/systemd/network/10-{{ item.name }}.netdev"
        content: |
          [NetDev]
          Name={{ item.name }}
          Kind=vlan
          
          [VLAN]
          Id={{ item.id }}
      loop:
        - { name: "{{ iface_public }}",   id: "{{ vlan_id_public }}" }
        - { name: "{{ iface_private }}",  id: "{{ vlan_id_private }}" }
        - { name: "{{ iface_internal }}", id: "{{ vlan_id_internal }}" }
      when: vlan_parent is defined

    # ==============================================================================
    # PHASE 2: ADMIN INTERFACE (THE GATEWAY)
    # ==============================================================================
    # We need two versions of this because on Bare Metal, the Admin interface
    # is also the "Parent" that holds the VLANs.

    - name: "Config: Admin Interface (Trunk Parent)"
      copy:
        dest: "/etc/systemd/network/10-admin-trunk.network"
        content: |
          [Match]
          Name={{ iface_admin }}
          
          [Network]
          Address={{ admin_ip }}/24
          Gateway={{ admin_ip.split('.')[0:3] | join('.') }}.254
          DNS=1.1.1.1
          # KEY DIFFERENCE: We attach the VLANs here so the OS knows they are linked
          VLAN={{ iface_public }}
          VLAN={{ iface_private }}
          VLAN={{ iface_internal }}
      when: vlan_parent is defined

    - name: "Config: Admin Interface (Standard VM)"
      copy:
        dest: /etc/systemd/network/10-admin.network
        content: |
          [Match]
          Name={{ iface_admin }}
          
          [Network]
          Address={{ admin_ip }}/24
          Gateway={{ admin_ip.split('.')[0:3] | join('.') }}.254
          DNS=1.1.1.1
      when: vlan_parent is not defined

    # ==============================================================================
    # PHASE 3: K8S HOST NETWORKING (YOUR ORIGINAL LOGIC)
    # ==============================================================================
    # This section applies the logic to "{{ iface_public }}".
    # On VMs, that variable is "enX1". On Bare Metal, it is "vlan.20".
    # The logic (Table 200, Split Horizon) remains identical.

    - name: "Config: Public Interface (Ingress/MetalLB)"
      copy:
        dest: /etc/systemd/network/20-public.network
        content: |
          [Match]
          Name={{ iface_public }}
          
          [Network]
          Address={{ public_ip }}/24
          # Note: NO default Gateway here.
          
          # [cite_start]POLICY: Source Routing (Table 200) [cite: 8]
          # Ensures that if an external user hits this IP, the reply goes back out this NIC.
          [RoutingPolicyRule]
          From={{ public_ip }}/32
          Table=200
          Priority=200
          
          # [cite_start]ROUTE: The Gateway for Table 200 only [cite: 8]
          [Route]
          Destination=0.0.0.0/0
          Gateway={{ gateway_public }}
          Table=200

    - name: "Config: Private Interface (CNI/Calico)"
      copy:
        dest: /etc/systemd/network/30-private.network
        content: |
          [Match]
          Name={{ iface_private }}
          
          [Network]
          Address={{ private_ip }}/24
          # No Gateway. No Rules. [cite_start]Calico handles the routing between nodes. [cite: 8]

    - name: "Config: Internal Interface (Storage)"
      copy:
        dest: /etc/systemd/network/40-internal.network
        content: |
          [Match]
          Name={{ iface_internal }}
          
          [Network]
          Address={{ internal_ip }}/24

    # ==============================================================================
    # CLEANUP & APPLY
    # ==============================================================================
    - name: Remove Old Policy Files
      file:
        path: "/etc/systemd/network/{{ item }}"
        state: absent
      loop:
        - 50-admin-policy.network
        - 60-public-policy.network
        - 70-isolation-policy.network
        - 10-admin.network # Remove standard admin file if we are now a trunk
      # Only remove the standard admin file if we are using the trunk file
      when: (item != '10-admin.network') or (vlan_parent is defined)

    - name: Apply Network Changes
      shell: |
        systemctl disable --now ifupdown
        systemctl enable --now systemd-networkd
        systemctl enable --now systemd-resolved
        systemctl restart systemd-networkd
      async: 15
      poll: 0
