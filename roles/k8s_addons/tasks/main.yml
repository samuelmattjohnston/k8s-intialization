# ==============================================================================
# 0. SETUP & TOOLS
# ==============================================================================
- include_role:
    name: networking
    tasks_from: normalize

- name: "Tools: Download Cilium CLI"
  get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ versions.cilium_cli }}/cilium-linux-amd64.tar.gz"
    dest: /tmp/cilium-cli.tar.gz
    mode: '0644'

- name: "Tools: Install Cilium CLI"
  unarchive:
    src: /tmp/cilium-cli.tar.gz
    dest: /usr/local/bin
    remote_src: yes
    mode: '0755'

- name: "Tools: Download Istioctl"
  unarchive:
    src: "https://github.com/istio/istio/releases/download/{{ versions.istio }}/istio-{{ versions.istio }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: yes
    extra_opts: ["--strip-components=1", "istio-{{ versions.istio }}/bin/istioctl"]
    creates: /usr/local/bin/istioctl

# ==============================================================================
# 1. CILIUM (CNI Layer)
# ==============================================================================
- name: "Cilium: Check Status"
  command: cilium status --wait=false
  register: cilium_check
  failed_when: false
  changed_when: false

- name: "Cilium: Install"
  shell: |
    cilium install \
      --version {{ versions.cilium }} \
      --set kubeProxyReplacement=true \
      --set k8sServiceHost={{ cluster_vip }} \
      --set k8sServicePort=6443 \
      --set devices='{{ net_private_dev }}' \
      --set l2announcements.enabled=true \
      --set loadBalancer.algorithm={{ cilium_config.loadbalancer_alg }} \
      --set bpf.masquerade={{ cilium_config.bpf_masquerade | lower }} \
      --set bpf.hostLegacyRouting=false \
      --wait
  when: cilium_check.rc != 0

# ==============================================================================
# 2. ISTIO (Controller + CRDs)
# ==============================================================================
- name: "Gateway API: Install CRDs"
  kubernetes.core.k8s:
    state: present
    src: "https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ versions.gateway_api_crd }}/standard-install.yaml"

- name: "Gateway API: Wait for CRD"
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: gateways.gateway.networking.k8s.io
  register: gateway_crd
  until: >
    gateway_crd.resources | length > 0 and
    (gateway_crd.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | list | length > 0)
  retries: 20
  delay: 5

- name: "Istio: Check Control Plane"
  command: kubectl get deployment istiod -n istio-system
  register: istio_check
  failed_when: false
  changed_when: false

- name: "Istio: Stage Config"
  template:
    src: istio-config.yaml.j2
    dest: /tmp/istio-config.yaml
  when: istio_check.rc != 0

# Istio Install runs here. This includes the 'base' component which has the CRDs.
- name: "Istio: Install Ambient Mesh"
  shell: |
    istioctl install -y -f /tmp/istio-config.yaml
  register: istio_install
  changed_when: "'Pruning' in istio_install.stdout or 'Installing' in istio_install.stdout"

- name: "Audit: Verify Istio CNI Chaining"
  shell: |
    # Look for any CNI configuration list file
    # Then grep to see if 'istio-cni' has been added to the plugins list
    grep -r "istio-cni" /etc/cni/net.d/
  register: cni_chain_check
  changed_when: false
  failed_when: cni_chain_check.rc != 0
  # We delay briefly to ensure the CNI node agent has had time to patch the file
  retries: 5
  delay: 5
  until: cni_chain_check.rc == 0

- name: "Istio: Wait for Ztunnel"
  kubernetes.core.k8s_info:
    kind: DaemonSet
    namespace: istio-system
    name: ztunnel
  register: ztunnel_ds
  until: >
    ztunnel_ds.resources | length > 0 and
    ztunnel_ds.resources[0].status.numberReady == ztunnel_ds.resources[0].status.desiredNumberScheduled
  retries: 20
  delay: 5

- name: "Gateway API: Wait for CRD (Native)"
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: gateways.gateway.networking.k8s.io
  register: gateway_crd
  until: >
    gateway_crd.resources | length > 0 and
    (gateway_crd.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | list | length > 0)
  retries: 20
  delay: 5

# ==============================================================================
# 3. ACTIVATE AMBIENT MODE
# ==============================================================================
- name: "Istio: Enable Ambient Mode for Default Namespace"
  kubernetes.core.k8s:
    kind: Namespace
    name: default
    merge_type: merge
    definition:
      metadata:
        labels:
          istio.io/dataplane-mode: ambient

# ==============================================================================
# 4. GATEWAY RESOURCE
# ==============================================================================
- name: "Gateway: Apply Resource"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'gateway.yaml.j2') }}"

# We wait for Istio to auto-provision the Deployment before MetalLB starts
- name: "Gateway: Wait for Provisioning (Native)"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: istio-system
    label_selectors:
      - istio.io/gateway-name=main-gateway
  register: gateway_pods
  until: >
    gateway_pods.resources | length > 0 and
    (gateway_pods.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 24
  delay: 5
# ==============================================================================
# 5. METALLB (Native Module)
# ==============================================================================
- name: "MetalLB: Install"
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/metallb/metallb/{{ versions.metallb }}/config/manifests/metallb-native.yaml"

- name: "MetalLB: Wait for Controller (Native)"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: metallb-system
    label_selectors:
      - app=metallb
  register: metallb_pods
  until: >
    metallb_pods.resources | length > 0 and
    (metallb_pods.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 18
  delay: 5

- name: "MetalLB: Apply Pool Config"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'metallb-config.yaml.j2') }}"

# ==============================================================================
# 6. NODE TAINTS
# ==============================================================================
- name: "Taint: Ensure Masters are Schedulable"
  kubernetes.core.k8s_taint:
    state: absent
    name: "{{ item }}"
    taints:
      - key: "node-role.kubernetes.io/control-plane"
        effect: "NoSchedule"
  loop: "{{ groups['masters'] }}"
  when: hostvars[item].k8s_schedulable | default(true) | bool
