---
# ----------------------------------------------------------------------
# PHASE 1: PREPARE ALL NODES
# ----------------------------------------------------------------------
- hosts: masters
  become: yes
  roles:
    - networking
  
  tasks:
    # --- OS PREP ---
    - name: Load Kernel Modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
          
    - name: Activate Modules
      shell: modprobe overlay && modprobe br_netfilter

    - name: Configure Sysctl
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
    
    - name: Apply Sysctl
      command: sysctl --system

    - name: Disable Swap
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: Update /etc/hosts for Local Resolution
      blockinfile:
        path: /etc/hosts
        block: |
          127.0.0.1 localhost
          127.0.1.1 {{ inventory_hostname }}
          {% for host in groups['masters'] %}
          {{ hostvars[host].admin_ip }} {{ host }}
          {% endfor %}

    - name: Install Dependencies
      apt:
        name: [apt-transport-https, ca-certificates, curl, gpg, socat, conntrack]
        state: present
        update_cache: yes

    # --- CONTAINERD ---
    - name: Add Docker Repo
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update APT Cache
      apt:
        update_cache: yes

    - name: Install Containerd
      apt:
        name: containerd.io
        state: present

    - name: Configure Containerd
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
        sed -i 's|sandbox_image = ".*"|sandbox_image = "registry.k8s.io/pause:3.10"|g' /etc/containerd/config.toml
      notify: Restart Containerd

    # --- KUBERNETES ---
    - name: Add K8s Repo
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /' > /etc/apt/sources.list.d/kubernetes.list
      args:
        creates: /etc/apt/sources.list.d/kubernetes.list

    - name: Install Kube Tools
      apt:
        name: [kubelet, kubeadm, kubectl]
        state: present
        update_cache: yes
    
    - name: Hold Packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: [kubelet, kubeadm, kubectl]

    # --- KUBE-VIP (HA) - MISSING IN YOUR DIFF ---
    # This must run AFTER networking (to get net_admin_dev) and BEFORE kubeadm init
    - name: Create Manifest Directory
      file: path=/etc/kubernetes/manifests state=directory

    - name: Pre-pull Kube-VIP Image
      command: crictl pull ghcr.io/kube-vip/kube-vip:v0.8.2
      register: vip_pull
      retries: 5
      delay: 10
      until: vip_pull.rc == 0
      
    - name: Deploy Kube-VIP Static Pod
      template:
        # This file is in your root templates/ folder (not in a role)
        src: templates/kube-vip.yaml.j2
        dest: /etc/kubernetes/manifests/kube-vip.yaml

    - name: Pre-pull Kubernetes Images
      command: kubeadm config images pull --kubernetes-version v1.31.0
      register: k8s_pull
      retries: 5
      delay: 10
      until: k8s_pull.rc == 0

  handlers:
    - name: Restart Containerd
      service: name=containerd state=restarted

# ----------------------------------------------------------------------
# PHASE 2: BOOTSTRAP LEADER
# ----------------------------------------------------------------------
- hosts: masters[0]
  become: yes
  tasks:
    - name: Check if Cluster is initialized
      stat: path=/etc/kubernetes/admin.conf
      register: cluster_admin_conf

    - name: Initialize Cluster (Skip Kube-Proxy)
      command: >
        kubeadm init 
        --control-plane-endpoint "{{ cluster_vip }}:6443" 
        --upload-certs 
        --apiserver-advertise-address "{{ admin_ip }}" 
        --pod-network-cidr "10.244.0.0/16"
        --cri-socket unix:///var/run/containerd/containerd.sock
        --skip-phases=addon/kube-proxy
      args:
        creates: /etc/kubernetes/admin.conf
      register: init_output
      when: not cluster_admin_conf.stat.exists

    - name: Setup Kubeconfig
      shell: |
        mkdir -p /home/{{ ansible_user }}/.kube
        cp /etc/kubernetes/admin.conf /home/{{ ansible_user }}/.kube/config
        chown -R {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube

    - name: Generate Join Token
      command: kubeadm token create --print-join-command
      register: join_command_raw

    - name: Get Certificate Key
      shell: kubeadm init phase upload-certs --upload-certs | tail -1
      register: cert_key_raw

    # Store these variables in a dummy host so other plays can read them
    - name: Register Dummy Host for Variables
      add_host:
        name: "K8S_TOKEN_HOLDER"
        join_base: "{{ join_command_raw.stdout }}"
        cert_key: "{{ cert_key_raw.stdout | trim }}"

# ----------------------------------------------------------------------
# PHASE 3: JOIN FOLLOWERS
# ----------------------------------------------------------------------
- hosts: masters[1:]
  become: yes
  serial: 1
  vars:
    join_base: "{{ hostvars['K8S_TOKEN_HOLDER']['join_base'] }}"
    cert_key: "{{ hostvars['K8S_TOKEN_HOLDER']['cert_key'] }}"
  tasks:
    - name: Check if joined
      stat: path=/etc/kubernetes/kubelet.conf
      register: joined

    - name: Join Cluster
      command: >
        {{ join_base }} 
        --control-plane 
        --certificate-key {{ cert_key }} 
        --apiserver-advertise-address {{ admin_ip }}
      when: not joined.stat.exists

# ----------------------------------------------------------------------
# PHASE 4: ADDONS (Cilium, Istio, MetalLB)
# ----------------------------------------------------------------------
- hosts: masters[0]
  become: yes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  roles:
    - k8s_addons
